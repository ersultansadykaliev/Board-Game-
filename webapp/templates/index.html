<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Mini App</title>
    <!-- Подключаем Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div id="app-container">
        <main>
            <div id="game-menu" class="menu-container">
                <div class="menu-header">
                    <h1>Настольные Игры</h1>
                    <p>Выберите игру и режим</p>
                </div>
                
                <button id="btn-show-my-games" class="btn-friend" style="display: none; margin-bottom: 20px; width: 100%; padding: 12px; font-size: 16px; background: rgba(56, 189, 248, 0.2); border: 1px solid #38bdf8;" onclick="showMyGamesScreen()">🎮 Мои активные игры (<span id="active-games-count">0</span>)</button>
                
                <div class="game-card">
                    <h3 class="game-title"><span class="game-icon">♟&#xFE0E;</span> Шахматы</h3>
                    <div class="game-actions">
                        <button class="btn-ai" onclick="initGame('chess', 'PVE')">🤖 С ботом</button>
                        <button class="btn-friend" onclick="initGame('chess', 'PVP')">👤 С другом</button>
                    </div>
                </div>
                
                <div class="game-card">
                    <h3 class="game-title"><span class="game-icon">⚪</span> Шашки</h3>
                    <div class="game-actions">
                        <button class="btn-ai" onclick="initGame('checkers', 'PVE')">🤖 С ботом</button>
                        <button class="btn-friend" onclick="initGame('checkers', 'PVP')">👤 С другом</button>
                    </div>
                </div>
                
                <div class="game-card">
                    <h3 class="game-title"><span class="game-icon">⚫</span> Уголки</h3>
                    <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                        <label for="ugolki-variant" style="font-size: 14px; opacity: 0.8; color: #fff;">Вариант:</label>
                        <select id="ugolki-variant" style="flex: 1; padding: 8px 12px; border-radius: 8px; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 14px; outline: none; cursor: pointer;">
                            <option value="classic">Классика (3x4)</option>
                            <option value="square">Квадрат (3x3)</option>
                            <option value="triangle">Треугольник</option>
                        </select>
                    </div>
                    <div class="game-actions">
                        <button class="btn-ai" onclick="initGame('ugolki', 'PVE', document.getElementById('ugolki-variant').value)">🤖 С ботом</button>
                        <button class="btn-friend" onclick="initGame('ugolki', 'PVP', document.getElementById('ugolki-variant').value)">👤 С другом</button>
                    </div>
                </div>
            </div>
            
            <div id="my-games-screen" class="menu-container" style="display: none;">
                <div class="menu-header">
                    <h1>Активные Игры</h1>
                    <p>Продолжите незавершенную партию</p>
                </div>
                <div id="my-games-list" style="width: 100%;">
                    <!-- Здесь будут генерироваться карточки активных игр -->
                </div>
                <button class="btn-ai" style="width: 100%; margin-top: 15px;" onclick="hideMyGamesScreen()">🔙 Назад в меню</button>
            </div>
            

            <div id="waiting-screen" class="game-card" style="display: none; text-align: center; margin: 20px 10px;">
                <div class="spinner"></div>
                <h2 class="game-title" style="justify-content: center;">Ожидание друга...</h2>
                <p style="opacity: 0.8; margin-bottom: 20px; color: #fff;">Отправьте эту ссылку другу, чтобы он присоединился к игре:</p>
                <div class="invite-box" id="invite-link"></div>
                <button class="btn-friend" style="width: 100%; margin-top: 20px;" onclick="copyInviteLink()">📋 Скопировать ссылку</button>
                <button class="btn-ai" style="width: 100%; margin-top: 10px; background: rgba(51, 144, 236, 0.2); border: 1px solid #3390ec;" onclick="shareInviteLink()">✈️ Выбрать друга в Telegram</button>
            </div>
            
            <div id="game-area" style="display: none; width: 100%; flex-direction: column; height: 100%;">
                <header id="opponent-header">
                    <div class="player-info bot-info">
                        <span class="avatar" id="opponent-avatar">🤖</span>
                        <span class="name" id="opponent-name">Бот ИИ</span>
                    </div>
                </header>
                
                <div id="board-container" style="flex: 1; display: flex; align-items: center;">
                    <div id="board"></div>
                </div>
                <div id="status-message">Ожидание...</div>
                
                <footer>
                    <div class="player-info user-info">
                        <span class="avatar">👤</span>
                        <span class="name" id="user-name">Игрок</span>
                    </div>
                </footer>
                
                <div class="game-controls" style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
                    <button class="btn-friend" style="flex: 1; padding: 12px; font-size: 14px; background: rgba(255, 193, 7, 0.2); border: 1px solid #ffc107;" onclick="offerDraw()">🤝 Ничья</button>
                    <button class="btn-friend" style="flex: 1; padding: 12px; font-size: 14px; background: rgba(255, 82, 82, 0.2); border: 1px solid #ff5252;" onclick="surrenderGame()">🏳️ Сдаться</button>
                </div>
                <button class="btn-ai" style="width: 100%; margin-top: 10px; margin-bottom: 20px; padding: 12px; font-size: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);" onclick="exitToMenu()">🏠 Выйти в меню (не завершая)</button>
            </div>
        </main>
    </div>
    <script src="/static/app.js?v=3"></script>
</body>
</html>
